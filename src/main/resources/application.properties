spring.application.name=health-global-admin
server.port=${APP_SERVER_PORT}

# Database
spring.datasource.url=jdbc:postgresql://${APP_POSTGRES_HOST}:${APP_POSTGRES_PORT}/${APP_POSTGRES_DB}
spring.datasource.username=${APP_POSTGRES_USER}
spring.datasource.password=${APP_POSTGRES_PASS}

# JPA
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration
